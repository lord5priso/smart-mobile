<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Waste - Accueil</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #00b894;
            --primary-dark: #009473;
            --bg-dark: #0f172a;
            --text-main: #ffffff;
            --text-muted: #94a3b8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: var(--text-main);
            padding: 20px;
        }

        /* Effet d'arrière-plan lumineux pro */
        .bg-glow {
            position: absolute;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(0,184,148,0.15) 0%, rgba(0,0,0,0) 70%);
            top: 20%;
            z-index: 1;
        }

        .main-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 40px 30px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            z-index: 2;
        }

        .structure-name {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: var(--primary);
            font-weight: 700;
            margin-bottom: 30px;
        }

        .logo-container {
            width: 130px;
            height: 130px;
            margin: 0 auto 30px auto;
            background: rgba(255, 255, 255, 0.02);
            border: 2px dashed rgba(0, 184, 148, 0.3);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .logo-container img {
            width: 100px;
            height: 100px;
            object-fit: contain;
        }

        h1 {
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
            background: linear-gradient(to right, #ffffff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .tagline {
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 40px;
        }

        .btn-action {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 100%;
            padding: 16px;
            background: var(--primary);
            color: #ffffff;
            border: none;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 20px rgba(0, 184, 148, 0.25);
            text-decoration: none;
        }

        .btn-action:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 12px 24px rgba(0, 184, 148, 0.35);
        }

        .btn-action:active {
            transform: translateY(0);
        }

        /* Lien discret vers l'espace Mairies tout en bas */
        .mairie-access {
            margin-top: 35px;
            font-size: 12px;
        }

        .mairie-access a {
            color: var(--text-muted);
            text-decoration: none;
            transition: color 0.2s;
        }

        .mairie-access a:hover {
            color: var(--primary);
        }
    </style>
</head>
<body>

    <div class="bg-glow"></div>

    <div class="main-card">
        <div class="structure-name">Communauté Urbaine</div>

        <div class="logo-container">
            <img src="icône.png" alt="Logo Smart Waste">
        </div>

        <h1>Smart Waste</h1>
        <p class="tagline">Géo-signalement citoyen pour une ville propre</p>

        <a href="map.html" class="btn-action">
            <i class="fa-solid fa-location-dot"></i> Accéder à la carte
        </a>

        <div class="mairie-access">
            <a href="mairies.html"><i class="fa-solid fa-building-flag"></i> Portail Collectivités & Mairies</a>
        </div>
    </div>

</body>
</html>
