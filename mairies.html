<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Waste - Portail Mairies</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
    :root {
        --primary: #00b894;
        --primary-dark: #009473;
        --bg-dark: #0f172a;
        --card-bg: rgba(255, 255, 255, 0.03);
        --border: rgba(255, 255, 255, 0.08);
        --text-main: #ffffff;
        --text-muted: #94a3b8;
    }

    * { 
        box-shadow: none;
        box-sizing: border-box; 
        margin: 0; 
        padding: 0; 
        font-family: 'Segoe UI', sans-serif; 
    }

    body {
        background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
        min-height: 100vh;
        color: var(--text-main);
        padding: 10px;
    }

    .container {
        width: 100%;
        max-width: 1000px;
        margin: 0 auto;
        background: var(--card-bg);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 15px;
        box-shadow: 0 20px 40px rgba(0,0,0,0.3);
    }

    header {
        display: flex;
        flex-direction: column; /* Aligné verticalement sur mobile */
        gap: 15px;
        margin-bottom: 20px;
        border-bottom: 1px solid var(--border);
        padding-bottom: 15px;
    }

    h1 {
        font-size: 18px;
        background: linear-gradient(to right, #ffffff, #94a3b8);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        text-align: center;
    }

    select {
        background: #1e293b;
        color: white;
        border: 1px solid var(--border);
        padding: 12px;
        border-radius: 10px;
        font-size: 14px;
        outline: none;
        cursor: pointer;
        width: 100%; /* Prend toute la largeur sur mobile */
    }

    /* Rendre le tableau défilable horizontalement sur petit écran */
    #tableContainer {
        width: 100%;
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
    }

    table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 10px;
        text-align: left;
        white-space: nowrap; /* Empêche le texte de s'écraser */
    }

    th, td {
        padding: 12px 10px;
        border-bottom: 1px solid var(--border);
    }

    th {
        color: var(--primary);
        font-weight: 600;
        text-transform: uppercase;
        font-size: 11px;
        letter-spacing: 0.5px;
    }

    td { font-size: 13px; color: #e2e8f0; }

    .img-thumb {
        width: 50px;
        height: 50px;
        object-fit: cover;
        border-radius: 6px;
        border: 1px solid var(--border);
    }

    .badge {
        padding: 4px 8px;
        border-radius: 20px;
        font-size: 10px;
        font-weight: 600;
    }
    .status-reported { background: rgba(239, 68, 68, 0.15); color: #ef4444; }
    .status-cleaned { background: rgba(34, 197, 94, 0.15); color: #22c55e; }

    .btn-action {
        background: var(--primary);
        color: white;
        border: none;
        padding: 8px 12px;
        border-radius: 6px;
        font-size: 12px;
        cursor: pointer;
        font-weight: 600;
    }

    .no-data {
        text-align: center;
        padding: 30px 10px;
        color: var(--text-muted);
        font-size: 14px;
    }

    /* ==========================================
       MEDIA QUERIES : Écrans plus grands (Tablettes / PC)
       ========================================== */
    @media (min-width: 768px) {
        body { padding: 30px 20px; }
        .container { padding: 30px; border-radius: 24px; }
        header { flex-direction: row; justify-content: space-between; align-items: center; gap: 0; }
        h1 { font-size: 24px; text-align: left; }
        select { width: auto; min-width: 250px; }
        th, td { padding: 15px; }
        td { font-size: 14px; }
    }
</style>

</head>
<body>

<div class="container">
    <header>
        <h1><i class="fa-solid fa-building-flag"></i> Espace Mairies d'Arrondissement</h1>
        <select id="mairieSelector" onchange="chargerDechetsMairie()">
            <option value="">-- Sélectionner votre Mairie --</option>
            <option value="Douala 1">Mairie de Douala 1er</option>
            <option value="Douala 2">Mairie de Douala 2e</option>
            <option value="Douala 3">Mairie de Douala 3e</option>
            <option value="Douala 4">Mairie de Douala 4e</option>
            <option value="Douala 5">Mairie de Douala 5e</option>
        </select>
    </header>

    <div id="tableContainer">
        <p class="no-data">Veuillez sélectionner une mairie pour afficher la liste des dépôts signalés.</p>
    </div>
</div>

<script>
async function chargerDechetsMairie() {
    const mairieSelectionnee = document.getElementById('mairieSelector').value;
    const container = document.getElementById('tableContainer');

    if (!mairieSelectionnee) {
        container.innerHTML = '<p class="no-data">Veuillez sélectionner une mairie pour afficher la liste.</p>';
        return;
    }

    container.innerHTML = '<p class="no-data"><i class="fa-solid fa-spinner fa-spin"></i> Chargement des signalements...</p>';

    try {
        const response = await fetch(`/api/mairie_reports?mairie=${encodeURIComponent(mairieSelectionnee)}`);
        const reports = await response.json();

        if (reports.length === 0) {
            container.innerHTML = '<p class="no-data">Aucun déchet signalé dans cette zone pour le moment. Félicitations !</p>';
            return;
        }

        let htmlTable = `
            <table>
                <thead>
                    <tr>
                        <th>Photo</th>
                        <th>Lieu précis</th>
                        <th>Description</th>
                        <th>Votes</th>
                        <th>Statut</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody>
        `;

        reports.forEach(report => {
            const badgeClass = report.status === 'cleaned' ? 'status-cleaned' : 'status-reported';
            const badgeLabel = report.status === 'cleaned' ? 'Nettoyé' : 'Signalé';
            
            // Gestion de l'affichage de l'image en Base64
            const photoHtml = report.photo ? `<img src="${report.photo}" class="img-thumb" onclick="window.open('${report.photo}')">` : '❌';

            htmlTable += `
                <tr>
                    <td>${photoHtml}</td>
                    <td><b>${report.mairie}</b></td>
                    <td>${report.description || 'Aucune description'}</td>
                    <td><i class="fa-solid fa-fire" style="color:#ff7675;"></i> ${report.votes}</td>
                    <td><span class="badge ${badgeClass}">${badgeLabel}</span></td>
                    <td>
                        ${report.status !== 'cleaned' ? `<button class="btn-action" onclick="nettoyerZone(${report.id})">Marquer comme nettoyé</button>` : '✅ Terminé'}
                    </td>
                </tr>
            `;
        });

        htmlTable += '</tbody></table>';
        container.innerHTML = htmlTable;

    } catch (error) {
        console.error(error);
        container.innerHTML = '<p class="no-data" style="color:#ff7675;">Erreur lors de la récupération des données.</p>';
    }
}

async function nettoyerZone(id) {
    if (!confirm("Confirmez-vous que cette zone a été nettoyée par les équipes de la Mairie ?")) return;

    try {
        const response = await fetch('/api/clean_report', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ id })
        });
        const data = await response.json();
        
        if (data.status === 'success') {
            alert(data.message);
            chargerDechetsMairie(); // Rafraîchir la liste
        }
    } catch (error) {
        alert("Impossible de mettre à jour le statut.");
    }
}
</script>
</body>
</html>
