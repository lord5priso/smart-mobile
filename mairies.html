<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Municipal - Douala (Thème Sombre)</title>
    <style>
        :root {
            --bg-dark: #121824;
            --card-dark: #1c2434;
            --primary-green: #27ae60;
            --primary-green-hover: #219653;
            --text-light: #f8f9fa;
            --text-muted: #94a3b8;
            --danger: #e74c3c;
            --warning: #f39c12;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-light);
            padding: 20px 15px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        header {
            margin-bottom: 25px;
            border-bottom: 2px solid var(--primary-green);
            padding-bottom: 15px;
        }

        header h1 {
            font-size: 24px;
            font-weight: 700;
            color: var(--text-light);
        }

        header p {
            color: var(--text-muted);
            font-size: 13px;
            margin-top: 5px;
        }

        /* Barre de filtres responsive */
        .nav-mairies {
            display: flex;
            gap: 8px;
            margin-bottom: 25px;
            overflow-x: auto; /* Permet de scroller horizontalement sur petit écran si besoin */
            padding-bottom: 5px;
            -webkit-overflow-scrolling: touch;
        }

        /* Masquer la barre de défilement pour un look plus propre */
        .nav-mairies::-webkit-scrollbar {
            display: none;
        }

        .btn-nav {
            padding: 8px 14px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            border: 1px solid #2d3748;
            background: #1e293b;
            color: var(--text-muted);
            border-radius: 6px;
            white-space: nowrap; /* Évite que le texte des boutons passe à la ligne */
            transition: all 0.2s ease;
        }

        .btn-nav:hover {
            background: #2d3748;
            color: var(--text-light);
        }

        .btn-nav.active {
            background: var(--primary-green);
            color: white;
            border-color: var(--primary-green);
        }

        /* Liste des signalements */
        #listeSignalementsMairie {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* Cartes de signalement 100% Responsives */
        .card-signalement {
            background: var(--card-dark);
            border-radius: 8px;
            padding: 15px;
            display: flex;
            flex-direction: column; /* Par défaut sur mobile : tout l'un en dessous de l'autre */
            gap: 15px;
            border-left: 5px solid transparent;
        }

        /* Image adaptative */
        .card-img {
            width: 100%;
            height: 150px;
            object-fit: cover;
            border-radius: 6px;
            background: #2d3748;
        }

        .card-body {
            flex-grow: 1;
        }

        .card-title {
            font-size: 16px;
            color: var(--text-light);
            margin-bottom: 6px;
        }

        .card-desc {
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 12px;
            line-height: 1.4;
        }

        .card-meta {
            display: flex;
            gap: 12px;
            align-items: center;
            font-size: 12px;
        }

        /* Badges */
        .badge {
            padding: 3px 8px;
            border-radius: 4px;
            font-weight: 600;
        }
        .badge-reported { background: rgba(231, 76, 60, 0.2); color: #ff6b6b; }
        .badge-progress { background: rgba(243, 156, 18, 0.2); color: #f39c12; }
        .badge-cleaned { background: rgba(39, 174, 96, 0.2); color: #2ecc71; }

        .priority-count {
            color: var(--text-muted);
        }

        /* Boutons d'action */
        .card-actions {
            display: flex;
            gap: 8px;
            width: 100%;
        }

        .btn-action {
            flex: 1; /* Les boutons prennent la même taille */
            padding: 10px;
            font-size: 12px;
            font-weight: 600;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            text-align: center;
            transition: background 0.2s;
        }

        .btn-take-charge { background: var(--warning); color: #121824; }
        .btn-validate { background: var(--primary-green); color: white; }
        .btn-take-charge:hover { background: #e67e22; }
        .btn-validate:hover { background: var(--primary-green-hover); }

        .empty-message {
            text-align: center;
            color: var(--text-muted);
            font-style: italic;
            background: var(--card-dark);
            border-radius: 8px;
            padding: 30px;
        }

        /* ==========================================
           MEDIA QUERIES : Passage en mode Tablette / PC
           ========================================== */
        @mixin desktop {
            @media (min-width: 600px) { @content; }
        }

        @media (min-width: 600px) {
            .card-signalement {
                flex-direction: row; /* Aligne l'image, le texte et les actions horizontalement */
                align-items: center;
                padding: 20px;
            }

            .card-img {
                width: 100px;
                height: 100px;
            }

            .card-actions {
                flex-direction: column; /* Aligne les deux boutons verticalement tout à droite */
                width: 160px;
                min-width: 160px;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>Dashboard Municipal</h1>
            <p>Espace d'administration • Thème vert & sombre</p>
        </header>
        
        <div class="nav-mairies">
            <button class="btn-nav active" id="btn-tous" onclick="filtrerParCommune('tous')">Tout Douala</button>
            <button class="btn-nav" id="btn-douala5" onclick="filtrerParCommune('douala 5')">Douala 5e</button>
            <button class="btn-nav" id="btn-akwa" onclick="filtrerParCommune('akwa')">Akwa / Deido</button>
            <button class="btn-nav" id="btn-bonaberi" onclick="filtrerParCommune('bonaberi')">Bonaberi</button>
        </div>

        <div id="listeSignalementsMairie"></div>
    </div>

    <script src="mairie.js"></script>
</body>
</html>
